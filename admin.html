<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理员后台 | 复盘引擎</title>
<style>
:root{--slate:#2C5282;--purple:#6B46C1;--bg:#F7F8FA;--card:#fff;--text:#2D3748;--muted:#718096;--border:#E2E8F0;--green:#2F855A;--red:#C53030;--amber:#C05621;--teal:#319795}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:20px 16px}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:24px 28px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header h1{font-size:22px}
.header .sub{font-size:13px;opacity:.7}
.header-right{display:flex;gap:10px;align-items:center}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);padding:18px 20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-card .number{font-size:28px;font-weight:700;color:var(--slate)}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:2px}
.stat-card.accent .number{color:var(--purple)}

.toolbar{background:var(--card);padding:16px 20px;border-radius:12px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.toolbar input,.toolbar select{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;flex:1;min-width:140px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--purple)}
.toolbar button{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#5a2d9e}
.btn-outline{background:transparent;border:1.5px solid var(--purple);color:var(--purple)}
.btn-outline:hover{background:var(--purple);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#236b42}

.table-wrap{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--slate);color:#fff}
th{padding:12px 14px;text-align:left;font-weight:600;font-size:12px}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:hover{background:#F7F9FC}
.customer-badge{background:#EDF2F7;padding:2px 10px;border-radius:10px;font-weight:600;color:var(--slate);font-size:12px}
.tag{display:inline-block;background:#E8E0F0;color:var(--purple);padding:1px 8px;border-radius:8px;font-size:11px;margin:1px 2px}
.preview-cell{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);cursor:pointer}
.preview-cell:hover{color:var(--text)}
.action-btn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:11px;cursor:pointer;margin:1px 2px;transition:all .1s}
.action-btn:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.action-btn.danger:hover{background:var(--red);color:#fff;border-color:var(--red)}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;padding:20px;overflow-y:auto}
.modal-overlay.show{display:flex;justify-content:center;align-items:flex-start;padding-top:40px}
.modal-box{background:#fff;border-radius:16px;max-width:800px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{background:var(--slate);color:#fff;padding:14px 20px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-header button{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.modal-body{padding:20px;font-size:14px;max-height:70vh;overflow-y:auto}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:52px;margin-bottom:12px}

.status-bar{position:fixed;bottom:16px;right:16px;padding:8px 20px;border-radius:20px;color:#fff;font-size:12px;z-index:200;opacity:0;transition:all .3s;transform:translateY(10px)}
.status-bar.show{opacity:1;transform:translateY(0)}
.status-bar.success{background:var(--green)}
.status-bar.error{background:var(--red)}

@media(max-width:768px){
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .toolbar{flex-direction:column}
  table{font-size:12px}
  th,td{padding:8px 10px}
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div>
    <h1>🔐 管理员后台</h1>
    <div class="sub">访后复盘引擎 · 本地数据（localStorage）</div>
  </div>
  <div class="header-right">
    <button class="btn-outline" onclick="exportBackup()" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);color:#fff">📥 导出备份</button>
    <button class="btn-green" onclick="window.open('index.html','_blank')">🚀 打开用户端</button>
  </div>
</div>

<!-- 统计卡片 -->
<div class="stat-row">
  <div class="stat-card">
    <div class="number" id="statTotal">0</div>
    <div class="label">📊 总复盘数</div>
  </div>
  <div class="stat-card">
    <div class="number" id="statWeek">0</div>
    <div class="label">📅 本周新增</div>
  </div>
  <div class="stat-card">
    <div class="number" id="statMonth">0</div>
    <div class="label">📆 本月新增</div>
  </div>
  <div class="stat-card accent">
    <div class="number" id="statCustomers">0</div>
    <div class="label">👥 独立客户数</div>
  </div>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 搜索客户名 / 复盘内容..." oninput="renderTable()">
  <select id="sortSelect" onchange="renderTable()">
    <option value="newest">最新在前</option>
    <option value="oldest">最早在前</option>
  </select>
  <select id="dateFilter" onchange="renderTable()">
    <option value="all">全部时间</option>
    <option value="today">今天</option>
    <option value="week">本周</option>
    <option value="month">本月</option>
  </select>
  <button class="btn-purple" onclick="renderAll()">🔄 刷新数据</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
  <button class="btn-outline" onclick="document.getElementById('importFile').click()">📤 导入</button>
  <button class="btn-outline" onclick="clearAll()" style="color:var(--red);border-color:var(--red)">🗑 清空</button>
</div>

<!-- 表格 -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>时间</th>
        <th>客户</th>
        <th>客户画像</th>
        <th>复盘预览</th>
        <th>主题标签</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>暂无复盘记录</p></div></td></tr>
    </tbody>
  </table>
</div>

<div style="text-align:center;padding:12px;font-size:11px;color:var(--muted)" id="pagination"></div>

</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle">复盘详情</span>
      <button onclick="closeModal()">✕ 关闭</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="status-bar success" id="statusBar"></div>

<script>
var DB_KEY = 'review_engine_v3_db';

document.addEventListener('DOMContentLoaded', renderAll);

function loadDB(){
  try{var d=localStorage.getItem(DB_KEY);return d?JSON.parse(d):[]}
  catch(e){return[]}
}

function renderAll(){
  renderStats();
  renderTable();
}

function renderStats(){
  var db = loadDB();
  var now = new Date();
  var today = now.toDateString();
  var weekAgo = new Date(now - 7*24*60*60*1000);
  var monthAgo = new Date(now - 30*24*60*60*1000);
  var customers = new Set(db.map(function(r){return r.customerName}));

  var weekCount = 0, monthCount = 0;
  db.forEach(function(r){
    var d = new Date(r.createdAt);
    if(d >= weekAgo) weekCount++;
    if(d >= monthAgo) monthCount++;
  });

  document.getElementById('statTotal').textContent = db.length;
  document.getElementById('statWeek').textContent = weekCount;
  document.getElementById('statMonth').textContent = monthCount;
  document.getElementById('statCustomers').textContent = customers.size;
}

function renderTable(){
  var db = loadDB();
  var search = (document.getElementById('searchInput').value||'').toLowerCase();
  var sort = document.getElementById('sortSelect').value;
  var dateF = document.getElementById('dateFilter').value;
  var now = new Date();

  var filtered = db.filter(function(r){
    if(search && (r.customerName||'').toLowerCase().indexOf(search)===-1 && (r.rawText||'').toLowerCase().indexOf(search)===-1) return false;
    var rd = new Date(r.createdAt);
    if(dateF==='today') return rd.toDateString()===now.toDateString();
    if(dateF==='week') return rd >= new Date(now-7*24*60*60*1000);
    if(dateF==='month') return rd >= new Date(now-30*24*60*60*1000);
    return true;
  });

  if(sort==='oldest') filtered.reverse();

  var tbody = document.getElementById('tableBody');
  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>没有匹配的记录</p></div></td></tr>';
    document.getElementById('pagination').textContent = '';
    return;
  }

  var html = '';
  filtered.forEach(function(r){
    var preview = (r.rawText||'').replace(/<[^>]*>/g,'').substring(0,60);
    var tags = (r.tags||[]).slice(0,3).map(function(t){return '<span class="tag">'+escHtml(t)+'</span>'}).join('');
    html += '<tr>';
    html += '<td style="white-space:nowrap">'+r.createdAt+'</td>';
    html += '<td><span class="customer-badge">'+escHtml(r.customerName||'未命名')+'</span></td>';
    html += '<td style="color:var(--muted);font-size:12px">'+escHtml(r.customerInfo||'')+'</td>';
    html += '<td class="preview-cell" onclick="viewDetail(\''+r.id+'\')">'+escHtml(preview)+'</td>';
    html += '<td>'+tags+'</td>';
    html += '<td>';
    html += '<button class="action-btn" onclick="viewDetail(\''+r.id+'\')">查看</button>';
    html += '<button class="action-btn danger" onclick="deleteReview(\''+r.id+'\',\''+escHtml(r.customerName||'未命名')+'\')">删除</button>';
    html += '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
  document.getElementById('pagination').textContent = '共 '+filtered.length+' 条记录';
}

function viewDetail(id){
  var db = loadDB();
  var r = db.find(function(x){return x.id===id});
  if(!r) return;
  document.getElementById('modalTitle').textContent = '复盘详情：'+r.customerName+' | '+r.createdAt;
  document.getElementById('modalBody').innerHTML = r.analysis || '<p style="color:var(--muted)">暂无分析内容</p><pre style="white-space:pre-wrap;font-size:12px;margin-top:12px;background:#F7F9FC;padding:12px;border-radius:8px">'+escHtml(r.rawText||'')+'</pre>';
  document.getElementById('detailModal').classList.add('show');
}

function closeModal(){
  document.getElementById('detailModal').classList.remove('show');
}

function deleteReview(id, name){
  if(!confirm('确定删除 '+name+' 的复盘记录？此操作不可撤销！')) return;
  var db = loadDB();
  db = db.filter(function(r){return r.id!==id});
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  showStatus('已删除', false);
  renderAll();
}

function exportBackup(){
  var db = loadDB();
  var backup = {exportedAt:new Date().toISOString(), totalRecords:db.length, reviews:db};
  var blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '复盘数据备份-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showStatus('✅ 备份已下载', false);
}

function importData(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      var reviews = data.reviews || data;
      if(!Array.isArray(reviews)){alert('格式错误：需要包含reviews数组'); return}
      var db = loadDB();
      var existing = new Set(db.map(function(r){return r.id}));
      var added = 0;
      reviews.forEach(function(r){
        if(!existing.has(r.id)){db.push(r); added++}
      });
      localStorage.setItem(DB_KEY, JSON.stringify(db));
      renderAll();
      showStatus('✅ 导入成功：新增 '+added+' 条，去重 '+(reviews.length-added)+' 条', false);
    }catch(e){alert('JSON解析失败：'+e.message)}
  };
  reader.readAsText(file);
  input.value = '';
}

function clearAll(){
  if(!confirm('⚠️ 确定清空全部复盘数据？此操作不可恢复！\n建议先导出备份。')) return;
  if(!confirm('再次确认：真的要删除所有 '+loadDB().length+' 条记录？')) return;
  localStorage.setItem(DB_KEY, '[]');
  renderAll();
  showStatus('已清空', false);
}

function showStatus(msg, isErr){
  var bar=document.getElementById('statusBar');
  bar.textContent=msg; bar.className='status-bar show '+(isErr?'error':'success');
  setTimeout(function(){bar.classList.remove('show')},3000);
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
